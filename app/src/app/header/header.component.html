<mat-toolbar class="site-header">
  <div class="brand">
    <a routerLink="/" class="brand-link">Gestionnaire de tâches</a>
    <span class="brand-tag">Organise tes tâches simplement avec la solution SOPOCOM !</span>
  </div>

  <nav class="main-nav" aria-label="Navigation principale">
    <a mat-button routerLink="/home" class="nav-link">Accueil</a>
    <a mat-button routerLink="/dashboard" class="nav-link">Tableau de bord</a>
    <button
      mat-flat-button
      color="primary"
      type="button"
      class="nav-link"
      (click)="handleAuthenticationAction()"
    >
      {{ isAuthenticated ? 'Se déconnecter' : 'Connexion' }}
    </button>
  </nav>
</mat-toolbar>
